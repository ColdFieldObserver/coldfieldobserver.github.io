<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>时间戳转换工具 - 冷域观者的个人网站</title>
    <link rel="stylesheet" href="../../style.css">
</head>
<body>

<nav class="navbar mica-card">
    <div class="logo">
        <h1>冷域观者的个人网站</h1>
    </div>
    <div class="nav-links">
        <a href="../../index.html">主页</a>
        <a href="../index.html">工具</a>
        <a href="../../about.html">关于</a>
    </div>
</nav>

<div class="main-grid">
    <main class="content-area">
        <div class="content-card mica-card">
            <h2>时间戳转换工具</h2>
            <p>这是一个简单的时间戳转换工具，支持时间戳与日期时间之间的相互转换。</p>
            
            <div class="form-group">
                <label class="form-label" for="timestampInput">时间戳：</label>
                <input type="text" class="input" id="timestampInput" placeholder="请输入时间戳（秒或毫秒）">
            </div>
            
            <div class="form-group">
                <label class="form-label" for="datetimeInput">日期时间：</label>
                <input type="datetime-local" class="input" id="datetimeInput">
            </div>
            
            <div class="btn-group">
                <button class="btn btn-block" onclick="timestampToDatetime()">时间戳 → 日期时间</button>
                <button class="btn btn-block" onclick="datetimeToTimestamp()">日期时间 → 时间戳</button>
                <button class="btn btn-block" onclick="getCurrentTimestamp()">获取当前时间戳</button>
                <button class="btn btn-block" onclick="clearAll()">清空</button>
            </div>
            
            <div class="form-group">
                <label class="form-label">转换结果：</label>
                <div class="tool-result-box" id="resultBox">
                    结果将显示在这里...
                </div>
                <button class="btn btn-secondary btn-sm" onclick="copyResult()" id="copyBtn">复制结果</button>
            </div>
            
            <div class="sidebar-block mica-card">
                <h3>关于时间戳</h3>
                <ul>
                    <li>时间戳是从1970年1月1日00:00:00 UTC开始计算的秒数或毫秒数</li>
                    <li>Unix时间戳通常以秒为单位（10位数字）</li>
                    <li>JavaScript时间戳以毫秒为单位（13位数字）</li>
                    <li>本工具自动识别秒级和毫秒级时间戳</li>
                    <li>支持本地时间和UTC时间的转换</li>
                </ul>
            </div>
        </div>
    </main>
</div>

<div class="footer-note">
    <p>2022-2026 冷域观者</p>
    <p>本网站由GitHub Pages托管，网站的源代码在<a href="https://github.com/ColdFieldObserver/coldfieldobserver.github.io" target="_blank">GitHub仓库</a>。</p>
</div>

<script src="script.js"></script>
</body>
</html>
