<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Unicode编解码工具 - 冷域观者的个人网站</title>
    <link rel="stylesheet" href="../../style.css">
</head>
<body>

<nav class="navbar mica-card">
    <div class="logo">
        <h1>冷域观者的个人网站</h1>
    </div>
    <div class="nav-links">
        <a href="../../index.html">主页</a>
        <a href="../index.html">工具</a>
        <a href="../../about.html">关于</a>
    </div>
</nav>

<div class="main-grid">
    <main class="content-area">
        <div class="content-card mica-card">
            <h2>Unicode编解码工具</h2>
            <p>这是一个简单的Unicode编码和解码工具，支持文本与Unicode码点之间的相互转换。</p>
            
            <div class="form-group">
                <label class="form-label" for="inputText">输入文本：</label>
                <textarea class="textarea" id="inputText" placeholder="请输入要编码或解码的文本..."></textarea>
            </div>
            
            <div class="btn-group">
                <button class="btn btn-block" onclick="encodeUnicode()">编码为Unicode</button>
                <button class="btn btn-block" onclick="decodeUnicode()">解码Unicode</button>
                <button class="btn btn-block" onclick="clearAll()">清空</button>
            </div>
            
            <div class="form-group">
                <label class="form-label">结果：</label>
                <div class="tool-result-box" id="resultBox">
                    结果将显示在这里...
                </div>
                <button class="btn btn-secondary btn-sm" onclick="copyResult()" id="copyBtn">复制结果</button>
            </div>
            
            <div class="sidebar-block mica-card">
                <h3>关于Unicode</h3>
                <ul>
                    <li>Unicode是一种字符编码标准，旨在统一世界上所有文字的编码</li>
                    <li>支持超过14万个字符，涵盖世界上绝大多数文字系统</li>
                    <li>Unicode码点通常表示为U+XXXX格式，其中XXXX是十六进制数</li>
                    <li>本工具支持UTF-16编码格式的Unicode转换</li>
                </ul>
            </div>
        </div>
    </main>
</div>

<div class="footer-note">
    <p>2022-2026 冷域观者</p>
    <p>本网站由GitHub Pages托管，网站的源代码在<a href="https://github.com/ColdFieldObserver/coldfieldobserver.github.io" target="_blank">GitHub仓库</a>。</p>
</div>

<script src="script.js"></script>
</body>
</html>
