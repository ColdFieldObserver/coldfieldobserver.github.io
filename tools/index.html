<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>工具列表 - 冷域观者的个人网站</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>

<nav class="navbar mica-card">
    <div class="logo">
        <h1>冷域观者的个人网站</h1>
    </div>
    <div class="nav-links">
        <a href="../index.html">主页</a>
        <a href="index.html">工具</a>
        <a href="../about.html">关于</a>
    </div>
</nav>

<!-- 主布局：左侧内容 + 右侧侧边栏 -->
<div class="main-grid">
    <!-- 主要内容区域 -->
    <main class="content-area">
        <div class="content-card mica-card">
            <h2>工具列表</h2>
            <p>这里提供了一些实用的在线工具，方便日常使用。</p>
            
            <div class="tools-grid">
                <div class="tool-card mica-card">
                    <h3>Base64编解码工具</h3>
                    <p>支持文本与Base64编码之间的相互转换</p>
                    <a href="base64/index.html" class="btn btn-primary">使用工具</a>
                </div>
                
                <div class="tool-card mica-card">
                    <h3>Unicode编解码工具</h3>
                    <p>支持文本与Unicode码点之间的相互转换</p>
                    <a href="unicode/index.html" class="btn btn-primary">使用工具</a>
                </div>
                
                <div class="tool-card mica-card">
                    <h3>时间戳转换工具</h3>
                    <p>支持时间戳与日期时间之间的相互转换</p>
                    <a href="timestamp/index.html" class="btn btn-primary">使用工具</a>
                </div>
                
                <div class="tool-card mica-card">
                    <h3>URL编解码工具</h3>
                    <p>支持URL字符串的编码和解码操作</p>
                    <a href="url/index.html" class="btn btn-primary">使用工具</a>
                </div>
            </div>
            
            <p style="margin-top: 2rem; font-size: 0.9rem; color: #4a7a8a;">更多工具正在开发中...</p>
        </div>
    </main>
</div>

<div class="footer-note">
    <p>2022-2026 冷域观者</p>
    <p>本网站由GitHub Pages托管，网站的源代码在<a href="https://github.com/ColdFieldObserver/coldfieldobserver.github.io" target="_blank">GitHub仓库</a>。</p>
</div>

<script src="../indexscript.js"></script>
</body>
</html>
